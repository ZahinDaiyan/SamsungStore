<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samsung Store</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="header">
    <a href="index.html" class="header__logo">
      <h1>Samsung</h1>
    </a>
    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__item"><a href="index.html" class="nav__link">Shop</a></li>
        <li class="nav__item"><a href="#" class="nav__link">My Profile</a></li>
      </ul>
    </nav>
    <a href="login.html" class="header__login"><button class="btn btn--primary">Log In</button></a>

  <main>
    <section class="hero">
      <div class="hero__content">
        <h2 class="hero__title"> The Future is in your Hands </h2>

          Explore the latest Samsung devices
        </p>
        <a href="products.html" class="btn btn--primary">Shop Now</a>
      </div>
      <div class="hero__image">
        <img src="https://assets.gadgetandgear.com/upload/media/Galaxy%20S26%20Plus/galaxy-s26-plus.jpeg"
          alt="Samsun Galaxy phone">
      </div>
    </section>

  <footer class="footer">
    <p class="footer__cotent">Zahin Daiyan 2026</p>
  </footer>

</html>
