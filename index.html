<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samsung Store</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="header">
    <a href="index.html" class="header__logo">
      <h1>Samsung</h1>
    </a>
    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__item"><a href="index.html" class="nav__link">Shop</a></li>
        <li class="nav__item"><a href="#" class="nav__link">My Profile</a></li>
      </ul>
    </nav>
    <a href="login.html" class="header__login"><button class="btn btn--primary">Log In</button></a>
  </header>

  <main>
    <section class="hero">
      <div class="hero__content">
        <h2 class="hero__title"> The Future is in your Hands </h2>
        <p class="hero__subtitle">
          Explore the latest Samsung devices
        </p>
        <a href="products.html" class="btn btn--primary">Shop Now</a>
      </div>
      <div class="hero__image">
        <img src="https://assets.gadgetandgear.com/upload/media/Galaxy%20S26%20Plus/galaxy-s26-plus.jpeg"
          alt="Samsun Galaxy phone">
      </div>
    </section>
    <section class="featured">
      <h2 class="featured__title">Explore More</h2>
      <div class="featured__grid">
        <div class="card">
          <img src="https://globalbrandeshop.com/media/thumbnail/I634RU42AV211.webp" alt="">
          <div class="card__body">
            <h3 class="card__name">F22</h3>
            <p class="card__price">20000৳</p>
            <a href="images/galaxyS26.jpg" class="btn btn--primary">View Product</a>
          </div>
        </div>
        <div class="card">
          <img src="https://globalbrandeshop.com/media/thumbnail/I477IR39IO231.jpeg" alt="">
          <div class="card__body"></div>
          <h3 class="card__name">Galaxy S24 FE</h3>
          <p class="card__price">137,200৳</p>
          <a href="" class="btn btn--primary">View Product</a>
        </div>
        <div class="card">
          <img src="https://globalbrandeshop.com/media/thumbnail/I368ZD27TZ690.jpg" alt="">
          <div class="card__body"></div>
          <h3 class="card__name">Galaxy A06</h3>
          <p class="card__price">200500৳</p>
          <a href="" class="btn btn--primary">View Product</a>
        </div>
      </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__cotent">Zahin Daiyan 2026</p>
  </footer>
</body>

</html>
