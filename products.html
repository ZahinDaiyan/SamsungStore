<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samsung Store - Products</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="header__logo">
      <h1>Samsung</h1>
    </a>
    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__item"><a href="products.html" class="nav__link">Shop</a></li>
        <li class="nav__item"><a href="#" class="nav__link">My Profile</a></li>
      </ul>
    </nav>
    <a href="login.html" class="header__login">
      <button class="btn btn--primary">Log In</button>
    </a>
  </header>

  <main>
    <section class="products">
      <div class="products__header">
        <h2 class="products__title">All Products</h2>
        <div class="products__filters">
          <button class="filter-btn filter-btn--active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="phones">Phones</button>
          <button class="filter-btn" data-filter="tablets">Tablets</button>
          <button class="filter-btn" data-filter="watches">Watches</button>
          <button class="filter-btn" data-filter="tv">TV</button>
          <button class="filter-btn" data-filter="laptops">Laptops</button>
          <button class="filter-btn" data-filter="wearables">Wearables</button>
        </div>
      </div>
      <div class="products__grid">
        <div class="card" data-category="phones" >
          <img src="#" alt="#">
          <div class="card__body">
            <h3 class="card__name">Card 1</h3>
            <p class="card__price">100000</p>
            <a href="#" class="btn btn--primary">Buy Now</a>
          </div>
        </div>
        <div class="card" data-category="tablets">
          <img src="#" alt="#">
          <div class="card__body">
            <h3 class="card__name">Card 2</h3>
            <p class="card__price">200000</p>
            <a href="#" class="btn btn--primary">Buy Now</a>
          </div>
        </div>
        <div class="card"data-category="watches">
          <img src="#" alt="#">
          <div class="card__body">
            <h3 class="card__name">Card 3</h3>
            <p class="card__price">300000</p>
            <a href="#" class="btn btn--primary">Buy Now</a>
          </div>
        </div>
        <div class="card"data-category="tv">
          <img src="" alt="">
          <div class="card__body">
            <h3 class="card__name">Card 4</h3>
            <p class="card__price">400000</p>
            <a href="" class="btn btn--primary">Buy Now</a>
          </div>
        </div>
        <div class="card" data-category="laptops">
          <img src="" alt="">
          <div class="card__body">
            <h3 class="card__name">Card 5</h3>
            <p class="card__price">500000</p>
            <a href="" class="btn btn--primary">Buy Now</a>
          </div>
        </div>
        <div class="card" data-category="wearables">
          <img src="" alt="">
          <div class="card__body">
            <h3 class="card__name">Card 6</h3>
            <p class="card__price">600000</p>
            <a href="" class="btn btn--primary">Buy Now</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__content">Zahin Daiyan 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
